<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f4c81" />
    <title>Offline - Umeda Survival Map</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(88vw, 420px);
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: white;
        padding: 24px;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      }

      p {
        color: #475569;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 12px;
        border-radius: 999px;
        background: #0f4c81;
        padding: 12px 16px;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Japan Survival Map</p>
      <h1>You are offline</h1>
      <p>The app shell, saved spots, reports, and recently viewed map tiles can still work from local cache.</p>
      <a href="/">Return to the map</a>
    </main>
  </body>
</html>
